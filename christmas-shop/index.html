<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style/style.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <link rel="icon" type="image/svg" href="/christmas-shop/images/svg/favicon.svg">
</head>

<body>
    <div class="flex-container">
        <header>
            <div class="logo-wrapper">
                <img class="logo" src="/christmas-shop/images/svg/favicon.svg" alt="logo">
                <span class="site-title">The Gifts</span>
            </div>
            <nav>
                <ul class="flex-nav">
                    <li>Gifts</li>
                    <li>About</li>
                    <li>Best</li>
                    <li>Contacts</li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="hero">
                <div class="hero-content">
                    <img src="/christmas-shop/images/svg/gift-icon.svg" alt="gift" class="hero-gift">
                    <p class="hero-subtitle">Merry Christmas</p>
                    <h2 class="hero-title">
                        GIFT YOURSELF<br>
                        THE MAGIC OF NEW<br>
                        POSSIBILITIES
                    </h2>
                    <button class="btn-primary">EXPLORE MAGICAL GIFTS</button>
                    <p class="hero-footer">and Happy New Year</p>
                </div>
            </section>

        </main>
    </div>
</body>

</html>
